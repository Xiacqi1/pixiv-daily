# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  # 定时触发：UTC 04:15 = 北京时间 12:15
  schedule:
    - cron: '15 4 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run Java Application
        run: java -jar target/pixiv-daily-jar-with-dependencies.jar --download

      - name: Commit and push IMAGES
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update IMAGES.md"
          file_pattern: "IMAGES.md"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pixiv-daily-logs
          path: logs/
          retention-days: 7

#      - name: Upload zip to Artifacts
#        uses: actions/upload-artifact@v4
#        with:
#          name: pixiv-daily-${{ github.run_number }}
#          path: releases/*.zip
#          retention-days: 7
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: daily-${{ github.run_number }}
          name: Daily ${{ github.run_number }}
          files: releases/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
      - name: Delete old releases
        run: |
          # 删除 7 天前的 Release
          gh release list --limit 100 | while read -r line; do
            tag=$(echo "$line" | awk '{print $1}')
            date=$(echo "$line" | awk '{print $4}')
            if [[ $(date -d "$date" +%s) -lt $(date -d '7 days ago' +%s) ]]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" --yes
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.MY_GIT_TOKEN }}